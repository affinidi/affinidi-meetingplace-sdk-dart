name: Pull Request Checks

on: 
  pull_request:
     
jobs:
  dart-pipeline:
    uses: affinidi/pipeline-dart/.github/workflows/check.yaml@main
    secrets: inherit
    with:
      flutter-version: '3.41.9'
      package: true
      pana_min_score: 160
      env_vars: |
        MEDIATOR_DID=${{ vars.MEDIATOR_DID }}
        MEDIATOR_DID_ALTERNATIVE=${{ vars.MEDIATOR_DID_ALTERNATIVE }}
        CONTROL_PLANE_DID=${{ vars.MATRIX_CONTROL_PLANE_DID }}
        MATRIX_HOMESERVER=${{ vars.MATRIX_HOMESERVER }}
        VODOZEMAC_LIBRARY_PATH=${{ vars.VODOZEMAC_LIBRARY_PATH }}
