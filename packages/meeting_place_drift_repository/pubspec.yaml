name: meeting_place_drift_repository
description: The Meeting Place Drift Repository is a package that uses Drift to persist and manage channels, connection offers, groups, anc chat history in local device storage.
repository: https://github.com/affinidi/affinidi-meetingplace-sdk-dart.git
version: 0.0.1-dev.40
resolution: workspace

environment:
  sdk: ^3.10.0

# Add regular dependencies here.
dependencies:
  clock: ^1.1.2
  drift: ^2.33.0
  meeting_place_chat: ^0.0.1-dev.39
  meeting_place_core: ^0.0.1-dev.36
  meeting_place_relationship: ^0.0.1-dev.1
  meta: ^1.16.0
  path: ^1.9.1
  sqlite3: ^3.0.0
  synchronized: ^3.4.0
  uuid: ^4.5.1

hooks:
  user_defines:
    sqlite3:
      source: sqlite3mc

dev_dependencies:
  build_runner: ^2.4.8
  dart_flutter_team_lints: ^3.5.1
  drift_dev: ^2.33.0
  test: ^1.25.6
