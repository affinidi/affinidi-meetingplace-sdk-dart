name: meeting_place_matrix_livekit
description: "Pure Dart SDK plugin for LiveKit-backed audio/video calls in the Affinidi Meeting Place Chat SDK. Implements AudioVideoCallPlugin using Matrix OpenID token exchange and LiveKit SFU. Requires a Flutter consumer package (meeting_place_livekit_flutter) to provide the LiveKitRoomInterface implementation."
version: 0.0.1-dev.0
publish_to: none
resolution: workspace
repository: https://github.com/affinidi/affinidi-meetingplace-sdk-dart.git

environment:
  sdk: ^3.8.0

dependencies:
  dio: ^5.8.0+1
  freezed_annotation: ^3.1.0
  matrix: ^7.2.2
  meeting_place_chat: ^0.0.1-dev.48
  meeting_place_core: ^0.0.1-dev.42

dev_dependencies:
  build_runner: ^2.5.4
  dart_flutter_team_lints: ^3.2.1
  freezed: ^3.1.0
  mocktail: ^1.0.4
  test: ^1.24.0
