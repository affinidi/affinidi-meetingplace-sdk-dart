name: meeting_place_matrix_livekit
description: "Flutter companion plugin for LiveKit-backed audio/video calls in the Affinidi Meeting Place Chat SDK. Implements AudioVideoCallPlugin using Matrix OpenID token exchange and LiveKit SFU."
version: 1.0.0
publish_to: none
repository: https://github.com/affinidi/affinidi-meetingplace-sdk-dart.git

environment:
  sdk: ^3.8.0

dependencies:
  dio: ^5.8.0+1
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  flutter_webrtc: ^1.4.0
  freezed_annotation: ^3.1.0
  livekit_client: ^2.7.0
  matrix: ^7.2.2
  meeting_place_chat:
    path: ../meeting_place_chat
  meeting_place_core:
    path: ../meeting_place_core
  permission_handler: ^12.0.1
  riverpod_annotation: ^3.0.3
  webrtc_interface: ^1.5.1

dev_dependencies:
  build_runner: ^2.5.4
  dart_flutter_team_lints: ^3.2.1
  flutter_test:
    sdk: flutter
  freezed: ^3.1.0
  mocktail: ^1.0.4
  riverpod_generator: ^3.0.3

# Override transitive path deps for local development.
# When published, both packages resolve from pub.dev and this section is removed.
# test_api is overridden to 0.7.12 to satisfy vodozemac's transitive constraint
# on test_core >=0.6.8 while keeping flutter_test compatible.
dependency_overrides:
  meeting_place_chat:
    path: ../meeting_place_chat
  meeting_place_control_plane:
    path: ../meeting_place_control_plane
  meeting_place_core:
    path: ../meeting_place_core
  test_api: ^0.7.12
